<!doctype html>
<html class="scrollbar-gutter-stable" lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#131420" id="themeColorMeta" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		%sveltekit.head%
	</head>
	<body
		class="min-h-dvh overscroll-y-none bg-bg font-sans text-text antialiased transition-colors duration-300 ease-out"
		data-sveltekit-preload-data="hover"
	>
		<div
			class="mx-auto flex min-h-dvh max-w-140 flex-col pb-30 min-[720px]:max-w-160 desktop:max-w-275 desktop:pb-15"
		>
			%sveltekit.body%
		</div>
	</body>
</html>
